services:
  autopub:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - autopub-data:/data
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
      DATA_DIR: /data
      APP_DIR: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  autopub-data:
